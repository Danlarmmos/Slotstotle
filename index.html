<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Idle Slot Empire</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
color:gold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.reels{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

.reel{
width:100px;
height:100px;
font-size:60px;
display:flex;
align-items:center;
justify-content:center;
background:#222;
border:3px solid gold;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

.shop{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
margin-top:20px;
}

.card{
background:#222;
padding:10px;
border-radius:10px;
}

.stat{
font-size:20px;
margin:10px;
}

.rebirth{
margin-top:20px;
background:#300;
padding:10px;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🎰 Idle Slot Empire</h1>

<div class="stat">
Coins: <span id="coins">0</span>
</div>

<div class="stat">
Rebirth Tokens: <span id="tokens">0</span>
</div>

<div class="reels">
<div class="reel" id="r1">🍒</div>
<div class="reel" id="r2">🍒</div>
<div class="reel" id="r3">🍒</div>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<h2>Shop</h2>

<div class="shop">

<div class="card">
<h3>Coin Multiplier</h3>
Level: <span id="multiLevel">0</span><br>
Cost: <span id="multiCost">50</span><br>
<button onclick="buyMultiplier()">Buy</button>
</div>

<div class="card">
<h3>Unlock Rare Icons</h3>
Unlocked: <span id="rareLevel">0</span><br>
Cost: <span id="rareCost">250</span><br>
<button onclick="buyRare()">Buy</button>
</div>

<div class="card">
<h3>Auto Spin</h3>
Level: <span id="autoLevel">0</span><br>
Cost: <span id="autoCost">1000</span><br>
<button onclick="buyAuto()">Buy</button>
</div>

<div class="card">
<h3>Spin Speed</h3>
Level: <span id="speedLevel">0</span><br>
Cost: <span id="speedCost">5000</span><br>
<button onclick="buySpeed()">Buy</button>
</div>

</div>

<div class="rebirth">
<h2>Rebirth</h2>
<p>Requires 1,000,000 Coins</p>
<button onclick="rebirth()">REBIRTH</button>
</div>

</div>

<script>

let save = JSON.parse(localStorage.getItem("slotSave")) || {

coins:0,

multiplier:1,
multiLevel:0,

rareLevel:0,

autoLevel:0,

speedLevel:0,

rebirthTokens:0

};

let symbols = ["🍒","🍋","🍉","⭐"];

function getSymbols(){

let arr=[...symbols];

if(save.rareLevel>=1) arr.push("💎");
if(save.rareLevel>=2) arr.push("7️⃣");
if(save.rareLevel>=3) arr.push("👑");
if(save.rareLevel>=4) arr.push("🌌");

return arr;

}

function randomSymbol(){

let pool=getSymbols();

return pool[Math.floor(Math.random()*pool.length)];

}

function spin(){

let a=randomSymbol();
let b=randomSymbol();
let c=randomSymbol();

r1.textContent=a;
r2.textContent=b;
r3.textContent=c;

let reward=0;

if(a===b && b===c){

reward=100;

if(a==="💎") reward=500;
if(a==="7️⃣") reward=1000;
if(a==="👑") reward=5000;
if(a==="🌌") reward=25000;

}
else if(a===b || b===c || a===c){

reward=25;

}

reward*=save.multiplier;
reward*=Math.max(1, save.rebirthTokens+1);

save.coins+=reward;

result.innerHTML=
reward>0 ?
`Won ${reward.toLocaleString()} coins!`
:
`No match`;

update();

}

function buyMultiplier(){

let cost=Math.floor(50*Math.pow(1.8,save.multiLevel));

if(save.coins>=cost){

save.coins-=cost;
save.multiLevel++;
save.multiplier*=2;

update();

}

}

function buyRare(){

let cost=Math.floor(250*Math.pow(3,save.rareLevel));

if(save.coins>=cost){

save.coins-=cost;
save.rareLevel++;

update();

}

}

function buyAuto(){

let cost=Math.floor(1000*Math.pow(2.5,save.autoLevel));

if(save.coins>=cost){

save.coins-=cost;
save.autoLevel++;

update();

}

}

function buySpeed(){

let cost=Math.floor(5000*Math.pow(3,save.speedLevel));

if(save.coins>=cost){

save.coins-=cost;
save.speedLevel++;

restartAuto();
update();

}

}

function rebirth(){

if(save.coins<1000000) return;

save.rebirthTokens++;

save.coins=0;

save.multiplier=1;
save.multiLevel=0;

save.rareLevel=0;

save.autoLevel=0;

save.speedLevel=0;

update();

}

let autoLoop;

function restartAuto(){

clearInterval(autoLoop);

if(save.autoLevel>0){

let speed=Math.max(
100,
2000-(save.speedLevel*200)
);

autoLoop=setInterval(()=>{

for(let i=0;i<save.autoLevel;i++){

spin();

}

},speed);

}

}

function update(){

coins.textContent=
Math.floor(save.coins).toLocaleString();

tokens.textContent=
save.rebirthTokens;

multiLevel.textContent=
save.multiLevel;

rareLevel.textContent=
save.rareLevel;

autoLevel.textContent=
save.autoLevel;

speedLevel.textContent=
save.speedLevel;

multiCost.textContent=
Math.floor(
50*Math.pow(1.8,save.multiLevel)
).toLocaleString();

rareCost.textContent=
Math.floor(
250*Math.pow(3,save.rareLevel)
).toLocaleString();

autoCost.textContent=
Math.floor(
1000*Math.pow(2.5,save.autoLevel)
).toLocaleString();

speedCost.textContent=
Math.floor(
5000*Math.pow(3,save.speedLevel)
).toLocaleString();

localStorage.setItem(
"slotSave",
JSON.stringify(save)
);

}

setInterval(update,1000);

update();
restartAuto();

</script>

</body>
</html>
